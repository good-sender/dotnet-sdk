openapi: 3.1.0
info:
  contact:
    email: support@goodsender.com
    name: Goodsender Support
  description: |
    Goodsender API.
    ### Authorization

    All API requests require an API key in the `Authorization` header:

    ```
    Authorization: Bearer <your-api-key>
    ```
  title: Goodsender API
  version: 1.0.0
servers:
- description: Production server
  url: https://api.goodsender.com
- description: Custom server URL
  url: "{CUSTOM_SERVER_URL}"
  variables:
    CUSTOM_SERVER_URL:
      default: https://api.dev.goodsender.com
security:
- bearerAuth: []
tags:
- description: |
    API to send and manage emails.
  name: Emails
- description: |
    API to manage sender domains.
  name: Domains
paths:
  /v1/emails/send:
    post:
      description: |
        Send one or more emails. Emails can be sent only to recipients who have opted in to receive communications from your domain.
        The response indicates how many emails were sent versus not sent, based on each recipient's consent state.
      operationId: SendEmail
      requestBody:
        content:
          application/json:
            examples:
              simple_email:
                summary: Simple Email
                value:
                  emails:
                  - from:
                      email: sender@example.com
                      name: Sender Name
                    to:
                    - email: recipient@example.com
                      name: Recipient Name
                    subject: Test Email
                    text_content: This is a test email
              html_email:
                summary: HTML Email with Attachment
                value:
                  emails:
                  - from:
                      email: sender@example.com
                    to:
                    - email: recipient@example.com
                    subject: HTML Email with Attachment
                    html_content: <h1>Hello</h1><p>This is an HTML email</p>
                    attachments:
                    - file_name: document.pdf
                      content: JVBERi0xLjQKJcOkw7zDtsO...
                      content_type: application/pdf
                    tracking:
                      opens: true
                      clicks: true
                      unsubscribes: false
              markdown_email:
                summary: Markdown Email
                value:
                  emails:
                  - from:
                      email: sender@example.com
                      name: Sender Name
                    to:
                    - email: recipient@example.com
                      name: Recipient Name
                    subject: Markdown Email
                    markdown_content: |-
                      # Hello

                      This is **bold** and this is *italic*.

                      - Item 1
                      - Item 2
              batch_emails:
                summary: Batch of Emails
                value:
                  emails:
                  - from:
                      email: sender@example.com
                    to:
                    - email: user1@example.com
                    - email: user2@example.com
                    subject: Batch Email 1
                    text_content: First email content
                  - from:
                      email: sender@example.com
                    to:
                    - email: user3@example.com
                    subject: Batch Email 2
                    html_content: <p>Second email content</p>
            schema:
              $ref: "#/components/schemas/SendEmailRequest"
        description: List of emails to send
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                sent: 8
                declined: 2
              schema:
                $ref: "#/components/schemas/SendEmailResponse"
          description: Email(s) accepted for sending
        "400":
          content:
            application/json:
              examples:
                missing_sender:
                  summary: Missing Sender
                  value:
                    error: Missing sender email
                invalid_email:
                  summary: Invalid Email
                  value:
                    error: "Invalid sender email: invalid-email"
                too_many_recipients:
                  summary: Too Many Recipients
                  value:
                    error: "Too many recipients: 1500"
                domain_not_allowed:
                  summary: Domain Not Allowed
                  value:
                    error: "you are not allowed to send from this domain: example.com"
              schema:
                $ref: "#/components/schemas/SendEmailErrorResponse"
          description: Bad request - validation error
        "401":
          content:
            application/json:
              example:
                error: Unauthorized
              schema:
                $ref: "#/components/schemas/SendEmailErrorResponse"
          description: Unauthorized - invalid or missing API key
        "413":
          content:
            application/json:
              example:
                error: Request payload too large
              schema:
                $ref: "#/components/schemas/SendEmailErrorResponse"
          description: Payload too large
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaExceededError"
          description: Quota exceeded.
          headers:
            Retry-After:
              description: Seconds until the quota resets.
              explode: false
              schema:
                type: integer
              style: simple
        "500":
          content:
            application/json:
              example:
                error: Internal server error
              schema:
                $ref: "#/components/schemas/SendEmailErrorResponse"
          description: Internal server error
        "502":
          content:
            application/json:
              example:
                error: Upstream email service unavailable
              schema:
                $ref: "#/components/schemas/SendEmailErrorResponse"
          description: Bad gateway - upstream email service unavailable
      security:
      - bearerAuth: []
      summary: Send an email or a batch of emails
      tags:
      - Emails
  /v1/emails/template:
    post:
      description: |
        Send a transactional email using a predefined template for common use cases like OTP codes, order confirmations, and new device login alerts.
        If the recipient has "denied" consent, the response returns `{"status": "declined"}` and the email is not sent. Unknown recipients are auto-registered with "pending" consent. The template endpoint does not change the recipient's consent.
        Each email includes an approve/reject footer allowing the recipient to manage future communications.
        Provide the template ID and any variables to fill in the placeholders. All variables are optional and will be replaced with an empty string if omitted.
        URL-type variables must point to the same domain as the sender's email address.
      operationId: SendTemplateEmail
      requestBody:
        content:
          application/json:
            examples:
              template_email:
                summary: Template Email
                value:
                  from:
                    email: sender@example.com
                    name: Sender Name
                  to:
                    email: recipient@example.com
                    name: Recipient Name
                  subject: Test Email
                  template:
                    template_id: otp_code
                    variables:
                      app_name: MyApp
                      otp_code: "482916"
            schema:
              $ref: "#/components/schemas/TemplateEmailRequest"
        description: Template email to send
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                status: sent
              schema:
                $ref: "#/components/schemas/TemplateEmailResponse"
          description: Whether the templated email was sent
        "400":
          content:
            application/json:
              examples:
                invalid_variables:
                  summary: Invalid Variables
                  value:
                    error: "Unknown template variable: invalid_var"
              schema:
                $ref: "#/components/schemas/SendEmailErrorResponse"
          description: Bad request - invalid variables or request body
        "401":
          content:
            application/json:
              example:
                error: Unauthorized
              schema:
                $ref: "#/components/schemas/SendEmailErrorResponse"
          description: Unauthorized - invalid or missing API key
        "404":
          content:
            application/json:
              example:
                error: "Template not found: unknown_template"
              schema:
                $ref: "#/components/schemas/SendEmailErrorResponse"
          description: Template not found
        "413":
          content:
            application/json:
              example:
                error: Request payload too large
              schema:
                $ref: "#/components/schemas/SendEmailErrorResponse"
          description: Payload too large
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaExceededError"
          description: Quota exceeded.
          headers:
            Retry-After:
              description: Seconds until the quota resets.
              explode: false
              schema:
                type: integer
              style: simple
        "500":
          content:
            application/json:
              example:
                error: Internal server error
              schema:
                $ref: "#/components/schemas/SendEmailErrorResponse"
          description: Internal server error
        "502":
          content:
            application/json:
              example:
                error: Upstream email service unavailable
              schema:
                $ref: "#/components/schemas/SendEmailErrorResponse"
          description: Bad gateway - upstream email service unavailable
      security:
      - bearerAuth: []
      summary: Send a transactional email using a template
      tags:
      - Emails
  /v1/emails/consent:
    post:
      description: |
        Send a consent message to each address so recipients can approve or reject future emails from your domain.
        Include the email addresses in the request body to start the consent flow.
      operationId: RequestEmailConsent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentEmailRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentEmailResult"
          description: Recipient consent status for each address (found or created)
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Invalid request
        "429":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |
            Too many consents are awaiting processing for this workspace. The
            internal release queue will drain pending entries automatically;
            retry later.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: |
            Internal server error. The upfront quota reservation (if any) is
            refunded and the request is safe to retry — `getOrCreateEmailsInDb`
            is idempotent.
        "502":
          content:
            application/json:
              example:
                error: Upstream email service unavailable
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad gateway - upstream email service unavailable
      summary: Request recipients' consent to receive emails from your domain
      tags:
      - Emails
  /v1/emails/{email}:
    get:
      description: Retrieve the current consent status for an email address. Optionally
        filter by sender domain.
      operationId: GetEmailConsentStatus
      parameters:
      - description: Email address to look up.
        explode: false
        in: path
        name: email
        required: true
        schema:
          example: user@example.com
          format: email
          type: string
        style: simple
      - description: "Optional sender domain to filter consent records by. When omitted,\
          \ returns consent across all domains."
        explode: true
        in: query
        name: domain
        required: false
        schema:
          example: example.com
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/EmailAccount"
                type: array
          description: Recipient consent status across all domains
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Invalid email address
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Email address was not found
      summary: Get recipient consent status
      tags:
      - Emails
  /v1/emails:
    get:
      description: Retrieve a paginated list of email consent statuses for a domain.
      operationId: ListEmailConsents
      parameters:
      - description: Sender domain to filter consent records by.
        explode: true
        in: query
        name: domain
        required: true
        schema:
          example: example.com
          type: string
        style: form
      - description: Maximum number of records to return.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Cursor for pagination.
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: "Status of the recipient's consent for receiving emails. 'pending'\
          \ = awaiting consent email send, 'requested' = consent email dispatched,\
          \ 'failed' = consent email delivery failed, 'granted' = recipient consented\
          \ to receive emails, 'denied' = recipient declined to receive emails."
        explode: true
        in: query
        name: consentStatus
        required: false
        schema:
          enum:
          - pending
          - requested
          - failed
          - granted
          - denied
          type: string
        style: form
      - description: Status of the recipient's engagement with the emails.
        explode: true
        in: query
        name: engagementStatus
        required: false
        schema:
          enum:
          - new
          - hot
          - warm
          - cooling
          - dormant
          - inactive
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailListResponse"
          description: A paginated list of email consent statuses
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Invalid request parameters
      summary: List email consent statuses
      tags:
      - Emails
  /v1/domains:
    get:
      description: |
        Retrieve a paginated list of sender domains for the workspace the
        API key belongs to. Each entry includes the domain's verification
        state so callers can detect when DNS records still need attention.
      operationId: ListDomains
      parameters:
      - description: Maximum number of records to return.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: "Cursor for pagination, returned as `nextCursor` from a previous\
          \ response."
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainListResponse"
          description: A paginated list of domains for the workspace.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Invalid request parameters.
        "401":
          content:
            application/json:
              example:
                code: invalid_api_key
                message: Authorization token is invalid.
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Unauthorized - invalid or missing API key.
      security:
      - bearerAuth: []
      summary: List domains
      tags:
      - Domains
components:
  schemas:
    Address:
      example:
        name: ""
        email: ""
      properties:
        email:
          default: ""
          description: Valid email address is required.
          format: email
          type: string
        name:
          default: ""
          description: Optional display name
          type: string
      required:
      - email
    Attachment:
      description: Either inline_id or file_name is required. Content must be base64
        encoded.
      example:
        content_type: ""
        file_name: ""
        content: content
        inline_id: ""
      properties:
        file_name:
          default: ""
          description: File name for the attachment
          type: string
        content:
          description: Base64 encoded content
          format: byte
          type: string
        content_type:
          default: ""
          description: MIME content type (required)
          type: string
        inline_id:
          default: ""
          description: Inline attachment ID
          type: string
      required:
      - content_type
    TrackingSettings:
      description: Controls email tracking and unsubscribe settings
      properties:
        opens:
          description: Whether to track email opens
          type: boolean
        clicks:
          description: Whether to track link clicks
          type: boolean
        unsubscribes:
          description: Whether to track unsubscribes
          type: boolean
        unsubscribe_group_id:
          description: "Optional unsubscribe group ID. If not specified, uses global\
            \ unsubscribe list. This setting is ignored if unsubscribes is false."
          format: int64
          nullable: true
          type: integer
    SendEmail:
      description: |
        Must provide valid sender and subject. At least one recipient (from 'to', 'cc', or 'bcc') is required. Either 'text_content', 'html_content', 'markdown_content', or 'template_id' is required. When 'markdown_content' is provided, 'text_content' and 'html_content' are ignored.
      example:
        headers:
          key: headers
        attachments:
        - content_type: ""
          file_name: ""
          content: content
          inline_id: ""
        - content_type: ""
          file_name: ""
          content: content
          inline_id: ""
        subject: ""
        text_content: text_content
        tracking: ""
        markdown_content: markdown_content
        html_content: html_content
        template_data:
          key: ""
        send_time: 0
        reply_to: ""
        from: ""
        template_id: template_id
        to:
        - name: ""
          email: ""
        - name: ""
          email: ""
        tag: tag
        webhook_data:
          key: webhook_data
      properties:
        from:
          allOf:
          - $ref: "#/components/schemas/Address"
          description: Sender address (required)
        to:
          description: "To recipients. At least one recipient (to, cc, or bcc) is\
            \ required. Maximum 1000 recipients per email."
          items:
            $ref: "#/components/schemas/Address"
          type: array
        subject:
          default: ""
          description: The subject of the email (required)
          type: string
        text_content:
          description: Plain text content
          type: string
        html_content:
          description: HTML content
          type: string
        markdown_content:
          description: |
            Markdown content. When provided, text_content and html_content are ignored. The raw markdown is used as text_content and rendered to HTML for html_content.
          minLength: 1
          type: string
        template_id:
          description: Template ID for templated emails
          type: string
        template_data:
          additionalProperties: true
          description: Data to populate template variables
          type: object
        attachments:
          description: Email attachments
          items:
            $ref: "#/components/schemas/Attachment"
          type: array
        headers:
          additionalProperties:
            type: string
          description: Custom email headers
        reply_to:
          allOf:
          - $ref: "#/components/schemas/Address"
          description: Reply-to address
        send_time:
          description: "Unix timestamp for when to send the email. Must not be more\
            \ than 72 hours in the future. If 0, sends immediately."
          format: int64
          type: integer
        webhook_data:
          additionalProperties:
            type: string
          description: "Custom data to include in webhook events. Maximum 10 keys,\
            \ key length 50 chars, value length 100 chars."
        tag:
          description: Custom tag for tracking. Maximum 100 characters.
          type: string
        tracking:
          allOf:
          - $ref: "#/components/schemas/TrackingSettings"
          description: Email tracking settings
      required:
      - from
      - subject
      - to
    SendEmailRequest:
      example:
        emails:
        - headers:
            key: headers
          attachments:
          - content_type: ""
            file_name: ""
            content: content
            inline_id: ""
          - content_type: ""
            file_name: ""
            content: content
            inline_id: ""
          subject: ""
          text_content: text_content
          tracking: ""
          markdown_content: markdown_content
          html_content: html_content
          template_data:
            key: ""
          send_time: 0
          reply_to: ""
          from: ""
          template_id: template_id
          to:
          - name: ""
            email: ""
          - name: ""
            email: ""
          tag: tag
          webhook_data:
            key: webhook_data
        - headers:
            key: headers
          attachments:
          - content_type: ""
            file_name: ""
            content: content
            inline_id: ""
          - content_type: ""
            file_name: ""
            content: content
            inline_id: ""
          subject: ""
          text_content: text_content
          tracking: ""
          markdown_content: markdown_content
          html_content: html_content
          template_data:
            key: ""
          send_time: 0
          reply_to: ""
          from: ""
          template_id: template_id
          to:
          - name: ""
            email: ""
          - name: ""
            email: ""
          tag: tag
          webhook_data:
            key: webhook_data
      properties:
        emails:
          description: List of emails to send. Cannot be empty.
          items:
            $ref: "#/components/schemas/SendEmail"
          type: array
      required:
      - emails
    SendEmailResponse:
      example:
        declined: 2
        sent: 8
      properties:
        sent:
          description: Number of emails sent (recipients had consent allowing delivery)
          example: 8
          type: integer
        declined:
          description: Number of emails not sent because recipients did not have granted
            consent to receive emails
          example: 2
          type: integer
      required:
      - declined
      - sent
    SendEmailErrorResponse:
      example:
        error: error
      properties:
        error:
          description: Error message
          type: string
      required:
      - error
    QuotaExceededError:
      example:
        code: quota_exceeded
        kind: daily
        resetAt: 2000-01-23T04:56:07.000+00:00
        limit: 0
        used: 6
        message: message
      properties:
        code:
          description: Machine-readable error code.
          enum:
          - quota_exceeded
          type: string
        kind:
          description: Whether the daily or monthly quota was exhausted.
          enum:
          - daily
          - monthly
          type: string
        message:
          description: Human-readable error message.
          type: string
        limit:
          description: Quota limit that was reached.
          type: integer
        used:
          description: Number of emails already used against the quota.
          type: integer
        resetAt:
          description: Timestamp at which the quota window resets.
          format: date-time
          type: string
      required:
      - code
      - kind
      - limit
      - message
      - resetAt
      - used
    TemplateEmailRequest:
      example:
        template:
          variables:
            key: variables
          template_id: template_id
        subject: subject
        from: ""
        to: ""
      properties:
        from:
          allOf:
          - $ref: "#/components/schemas/Address"
          description: Sender address (required)
        to:
          allOf:
          - $ref: "#/components/schemas/Address"
          description: Recipient address (required)
        subject:
          description: The subject of the email (required)
          minLength: 1
          type: string
        template:
          $ref: "#/components/schemas/TemplateEmailRequest_template"
      required:
      - from
      - subject
      - template
      - to
    TemplateEmailResponse:
      example:
        status: sent
      properties:
        status:
          description: "\"sent\" if the email was sent, \"declined\" if the recipient\
            \ has opted out"
          enum:
          - sent
          - declined
          example: sent
          type: string
      required:
      - status
    ConsentEmailRecipient:
      description: Recipient envelope with optional display name. Pass this shape
        instead of a bare email string when you want the name to appear in the To
        header on the consent email and in subsequent listings.
      properties:
        email:
          description: Recipient email address. Leading and trailing whitespace are
            stripped server-side.
          example: user@example.com
          format: email
          type: string
        name:
          description: |
            Optional display name. Pass a non-empty string to set or replace
            the stored name. Passing `null`, an empty string, or omitting the
            field on a re-submitted recipient leaves any previously-stored
            name unchanged — clearing must be done via the dashboard /
            authenticated edit flow.
          example: Jane Doe
          nullable: true
          type: string
      required:
      - email
    ConsentEmailEntry:
      description: |
        Single entry in the `emails` array of a consent request. Either a
        bare email string (back-compat) or a `{ email, name? }` object so
        callers can attach a display name to a specific recipient.
      oneOf:
      - description: |
          Bare recipient email address. Equivalent to passing the object
          form with only the `email` field set. Leading and trailing
          whitespace are stripped server-side.
        format: email
        title: Bare email address
        type: string
      - $ref: "#/components/schemas/ConsentEmailRecipient"
      title: ConsentEmailEntry
    ConsentEmailRequest:
      example:
        emails:
        - user1@example.com
        - email: user2@example.com
          name: Jane Doe
        domain: example.com
        redirect_url: "https://example.com/consent/{email}"
      properties:
        domain:
          description: Domain for the email addresses.
          example: example.com
          type: string
        redirect_url:
          description: "URL to which the user will be redirected after providing consent.\
            \ {email} in the URL will be replaced with the recipient's email address."
          example: "https://example.com/consent/{email}"
          type: string
        emails:
          description: |
            Recipients to request consent from. Each entry may be either a
            plain email string or a `{ email, name? }` object so callers can
            attach a display name to a specific recipient. Mixing the two
            forms in one request is allowed.
          example:
          - user1@example.com
          - email: user2@example.com
            name: Jane Doe
          items:
            $ref: "#/components/schemas/ConsentEmailEntry"
          maxItems: 1000
          minItems: 1
          type: array
      required:
      - domain
      - emails
    EmailAccount:
      example:
        engagementStatus: new
        domain: example.com
        consentStatus: pending
        name: Jane Doe
        email: user@example.com
      properties:
        email:
          description: Recipient email address.
          example: user@example.com
          format: email
          type: string
        name:
          description: "Optional display name for the recipient. Used in the To header\
            \ on the consent email when present, and surfaced through the Dashboard.\
            \ May be null when no name has been provided."
          example: Jane Doe
          nullable: true
          type: string
        domain:
          description: Domain part of the email address.
          example: example.com
          type: string
        consentStatus:
          description: "Status of the recipient's consent for receiving emails. 'pending'\
